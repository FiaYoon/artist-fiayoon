<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex" />
<title>FiaYoon — LOVE &amp; TRUE (ver2 immersive space)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#41545f; --ink-soft:#728690; --gold:#E8B96b; --cream:#F7F1E3;
    --font-display:"Playfair Display",serif; --font-body:"Noto Sans KR","Pretendard",sans-serif; }
  *,*::before,*::after{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:#0b1622; overflow:hidden;
    font-family:var(--font-body); -webkit-font-smoothing:antialiased;
    -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; }

  /* the Blockade Labs skybox — a real, explorable 360° space */
  #sky{ position:fixed; inset:0; width:100%; height:100%; border:0; z-index:0; display:block; background:#0b1622; }
  /* soft loading shimmer behind the iframe until it paints */
  #skyload{ position:fixed; inset:0; z-index:0; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(120% 100% at 50% 40%, #16324a, #0b1622 75%); color:rgba(247,241,227,.5);
    font-size:12px; letter-spacing:.3em; }
  #skyload span{ animation:pulse 1.8s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ opacity:.35; } 50%{ opacity:.85; } }

  /* legibility + depth scrim over the space */
  .scrim{ position:fixed; inset:0; z-index:1; pointer-events:none;
    background:
      radial-gradient(120% 80% at 50% 8%, rgba(6,14,22,.5), rgba(6,14,22,0) 34%),
      radial-gradient(120% 90% at 50% 108%, rgba(6,14,22,.62), rgba(6,14,22,0) 46%); }

  .brand{ position:fixed; top:clamp(18px,3vw,30px); left:clamp(20px,3.4vw,42px); z-index:4;
    font-family:var(--font-display); font-weight:700; color:#fff; font-size:clamp(20px,2.4vw,27px);
    text-shadow:0 2px 18px rgba(0,10,20,.6); }
  .brand small{ display:block; font-family:var(--font-body); font-weight:500; font-size:10px;
    letter-spacing:.42em; color:rgba(247,241,227,.72); margin-top:3px; }
  .vertag{ position:fixed; top:clamp(20px,3vw,32px); right:clamp(20px,3.4vw,42px); z-index:4;
    font-size:10px; letter-spacing:.32em; color:rgba(247,241,227,.62);
    border:1px solid rgba(247,241,227,.28); padding:6px 12px; border-radius:999px; }

  /* centred intro that fades away so you can look around */
  .intro{ position:fixed; inset:0; z-index:3; display:flex; flex-direction:column; align-items:center;
    justify-content:center; text-align:center; gap:16px; padding:24px;
    transition:opacity 1.1s ease, visibility 1.1s; }
  .intro.hide{ opacity:0; visibility:hidden; }
  .intro .k{ font-family:var(--font-body); font-weight:700; font-size:11px; letter-spacing:.5em; color:rgba(247,241,227,.75); }
  .intro h1{ font-family:var(--font-display); font-weight:700; margin:0; color:#fff;
    font-size:clamp(34px,7vw,74px); line-height:1.05; letter-spacing:.01em; text-shadow:0 3px 34px rgba(0,10,20,.6); }
  .intro p{ margin:0; color:rgba(247,241,227,.86); font-size:clamp(13px,1.7vw,16px); line-height:1.8; max-width:32ch;
    text-shadow:0 1px 14px rgba(0,10,20,.6); }

  /* look-around hint */
  .hint{ position:fixed; left:50%; bottom:calc(env(safe-area-inset-bottom,0px) + clamp(90px,15vh,130px));
    transform:translateX(-50%); z-index:4; color:rgba(247,241,227,.82); font-size:12px; letter-spacing:.06em;
    background:rgba(10,20,28,.4); padding:9px 18px; border-radius:999px; -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
    opacity:0; transition:opacity .8s ease; white-space:nowrap; }
  .hint.show{ opacity:1; }

  /* category entries + enter */
  .dock{ position:fixed; left:50%; bottom:calc(env(safe-area-inset-bottom,0px) + 22px); transform:translateX(-50%);
    z-index:4; display:flex; flex-direction:column; align-items:center; gap:14px;
    opacity:0; transition:opacity .9s ease .2s; pointer-events:none; }
  .dock.show{ opacity:1; pointer-events:auto; }
  .cats{ display:flex; flex-wrap:wrap; justify-content:center; gap:9px; max-width:min(94vw,560px); }
  .cats a{ text-decoration:none; color:#fff; font-family:var(--font-display); font-weight:700;
    font-size:12.5px; letter-spacing:.06em; padding:9px 18px; border-radius:999px;
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.3);
    -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); box-shadow:0 10px 26px rgba(0,10,22,.3);
    transition:background .25s, transform .2s; }
  .cats a:hover{ background:rgba(255,255,255,.22); transform:translateY(-2px); }
  .cats a small{ display:block; font-family:var(--font-body); font-weight:500; font-size:9px;
    letter-spacing:.1em; color:rgba(247,241,227,.7); margin-top:2px; }
  .enter{ cursor:pointer; text-decoration:none; font-family:var(--font-display); font-weight:700;
    font-size:15px; letter-spacing:.05em; color:#12222e; padding:13px 40px; border-radius:999px;
    background:linear-gradient(180deg, var(--cream), #E7D9B8); box-shadow:0 16px 40px rgba(0,10,22,.45);
    transition:transform .2s, box-shadow .25s; }
  .enter:hover{ transform:translateY(-2px); box-shadow:0 20px 46px rgba(0,10,22,.5); }

  @media (max-width:560px){
    .cats a{ font-size:11px; padding:8px 14px; }
    .vertag{ display:none; }
  }
</style>
</head>
<body>
  <div id="skyload"><span>LOADING SPACE…</span></div>
  <iframe id="sky"
    src="https://skybox.blockadelabs.com/e/e68b842e1bf7d9f40b95249f0d209a82"
    allow="fullscreen; accelerometer; gyroscope; xr-spatial-tracking"
    referrerpolicy="no-referrer-when-downgrade"
    title="FiaYoon immersive space"></iframe>

  <div class="scrim"></div>

  <div class="brand">FiaYoon<small>LOVE &amp; TRUE</small></div>
  <div class="vertag">VER 2 · IMMERSIVE</div>

  <div class="intro" id="intro">
    <div class="k">FIAYOON</div>
    <h1>LOVE &amp; TRUE</h1>
    <p>트루와 함께 거니는 몰입형 공간.<br>드래그해 사방을 둘러보세요.</p>
  </div>

  <div class="hint" id="hint">↔ 드래그하여 공간을 둘러보세요</div>

  <div class="dock" id="dock">
    <div class="cats">
      <a href="./">SERIES<small>작품 시리즈</small></a>
      <a href="./">ABOUT<small>작가 소개</small></a>
      <a href="./">TRUE AQUARIUM<small>나만의 어항</small></a>
      <a href="./">EXHIBITION<small>전시 이력</small></a>
    </div>
    <a class="enter" href="./">들어가기</a>
  </div>

<script>
  (function(){
    var intro=document.getElementById('intro'), hint=document.getElementById('hint'), dock=document.getElementById('dock');
    var sky=document.getElementById('sky'), load=document.getElementById('skyload');
    /* hide the loading shimmer once the iframe reports load */
    sky.addEventListener('load', function(){ if(load) load.style.display='none'; });
    setTimeout(function(){ if(load) load.style.display='none'; }, 6000); /* safety */
    /* let the visitor read the intro, then reveal the space + navigation */
    function reveal(){ intro.classList.add('hide'); hint.classList.add('show'); dock.classList.add('show'); }
    var revealed=false; function once(){ if(revealed)return; revealed=true; reveal(); }
    setTimeout(once, 3600);                 /* auto-reveal */
    addEventListener('pointerdown', once, {passive:true}); /* or as soon as they interact */
    addEventListener('wheel', once, {passive:true});
    /* fade the hint away after a while */
    setTimeout(function(){ hint.classList.remove('show'); }, 12000);
  })();
</script>
</body>
</html>
